<div class="login-page">
    <div class="login-card">
        <h2>Đăng nhập</h2>
        <p class="subtitle">Hệ thống quản lý và liên thông văn bản</p>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input id="username" type="text" name="username" [(ngModel)]="loginRequest.username"
                    placeholder="Nhập username" />
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input id="password" type="password" name="password" [(ngModel)]="loginRequest.password"
                    placeholder="Nhập password" />
            </div>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" [disabled]="loading">
                {{ loading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
            </button>
        </form>
    </div>
</div>
