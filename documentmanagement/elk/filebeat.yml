filebeat.inputs:
  - type: filestream
    id: document-transfer-log
    enabled: true
    paths:
      - /app/logs/app.log

    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info