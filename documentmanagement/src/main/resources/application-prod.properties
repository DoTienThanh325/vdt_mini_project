# MariaDB docker/server
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT prod
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Redis docker/server
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.redis.time-to-live=${REDIS_TTL:600000}

# File uploads docker/server
file.upload-dir=${FILE_UPLOAD_DIR:/app/uploads}

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=250MB
server.tomcat.max-http-form-post-size=100MB
server.tomcat.max-swallow-size=100MB

# Logging prod
logging.file.path=${LOG_PATH:/app/logs}

#Aes local
interconnection.encryption-key=${AES_SECRET_KEY}